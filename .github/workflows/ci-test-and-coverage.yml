name: Test and Coverage

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test-and-coverage:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: |
          set -o pipefail
          npm run test:coverage | tee vitest-output.txt

      - name: Collect metrics
        id: metrics
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const outputFile = process.env.GITHUB_OUTPUT;
          const vitestOutputPath = 'vitest-output.txt';
          const coverageSummaryPath = 'coverage/coverage-summary.json';
          const coverageFilesTablePath = 'coverage-files-table.md';

          function writeOutput(key, value) {
            fs.appendFileSync(outputFile, `${key}=${value}\n`, 'utf8');
          }

          function toPercent(metric) {
            const pct = metric && typeof metric.pct === 'number' ? metric.pct : null;
            return pct === null ? 'N/A' : `${pct.toFixed(2)}%`;
          }

          let testFiles = 'N/A';
          let tests = 'N/A';
          let duration = 'N/A';

          try {
            const rawOutput = fs.readFileSync(vitestOutputPath, 'utf8');
            const cleanOutput = rawOutput.replace(/\u001b\[[0-9;]*m/g, '');

            const testFilesMatch = cleanOutput.match(/Test Files\s+([^\n\r]+)/i);
            if (testFilesMatch) {
              testFiles = testFilesMatch[1].trim();
            }

            const testsMatch = cleanOutput.match(/Tests\s+([^\n\r]+)/i);
            if (testsMatch) {
              tests = testsMatch[1].trim();
            }

            const durationMatch = cleanOutput.match(/Duration\s+([^\n\r]+)/i);
            if (durationMatch) {
              duration = durationMatch[1].trim();
            }
          } catch {
            // Keep default values when vitest output is missing.
          }

          let coverage = 'N/A';
          let coveredLines = 'N/A';
          let missedLines = 'N/A';
          let measurableLines = 'N/A';
          let filesMeasured = '0';

          try {
            const report = JSON.parse(fs.readFileSync(coverageSummaryPath, 'utf8'));
            const total = report.total || {};
            const totalLines = total.lines || {};

            const linesTotal = Number(totalLines.total || 0);
            const linesCovered = Number(totalLines.covered || 0);
            const linesMissed = Math.max(linesTotal - linesCovered, 0);

            coverage = toPercent(totalLines);
            coveredLines = String(linesCovered);
            missedLines = String(linesMissed);
            measurableLines = String(linesTotal);

            const rows = Object.entries(report)
              .filter(([key]) => key !== 'total')
              .map(([file, metrics]) => {
                const normalizedFile = file.replace(/\\/g, '/');
                const lines = metrics.lines || {};
                const measurable = Number(lines.total || 0);
                const covered = Number(lines.covered || 0);
                const missed = Math.max(measurable - covered, 0);
                const pct = measurable > 0 ? (covered / measurable) * 100.0 : 0.0;

                return {
                  file: normalizedFile,
                  coverage: `${pct.toFixed(2)}%`,
                  covered,
                  missed,
                  measurable,
                  pct,
                };
              })
              .sort((a, b) => a.pct - b.pct || a.file.localeCompare(b.file));

            filesMeasured = String(rows.length);

            const tableLines = [
              '### Coverage by File',
              '',
              '| File | Coverage | Covered | Missed | Measurable |',
              '| --- | ---: | ---: | ---: | ---: |',
            ];

            for (const row of rows) {
              tableLines.push(
                `| ${row.file} | ${row.coverage} | ${row.covered} | ${row.missed} | ${row.measurable} |`
              );
            }

            fs.writeFileSync(coverageFilesTablePath, `${tableLines.join('\n')}\n`, 'utf8');
          } catch {
            fs.writeFileSync(
              coverageFilesTablePath,
              '### Coverage by File\n\nCoverage details are unavailable because coverage/coverage-summary.json could not be parsed.\n',
              'utf8'
            );
          }

          writeOutput('coverage', coverage);
          writeOutput('covered_lines', coveredLines);
          writeOutput('missed_lines', missedLines);
          writeOutput('measurable_lines', measurableLines);
          writeOutput('files_measured', filesMeasured);
          writeOutput('test_files', testFiles);
          writeOutput('tests', tests);
          writeOutput('duration', duration);
          NODE

          echo "result=${{ job.status }}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage
            vitest-output.txt
            coverage-files-table.md
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Test and Coverage Summary"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Status | ${{ steps.metrics.outputs.result }} |"
            echo "| Coverage (business logic lines) | ${{ steps.metrics.outputs.coverage }} |"
            echo "| Covered lines | ${{ steps.metrics.outputs.covered_lines }} |"
            echo "| Missed lines | ${{ steps.metrics.outputs.missed_lines }} |"
            echo "| Measurable lines | ${{ steps.metrics.outputs.measurable_lines }} |"
            echo "| Files measured | ${{ steps.metrics.outputs.files_measured }} |"
            echo "| Test files | ${{ steps.metrics.outputs.test_files }} |"
            echo "| Tests | ${{ steps.metrics.outputs.tests }} |"
            echo "| Duration | ${{ steps.metrics.outputs.duration }} |"
            echo "| Artifact | coverage-report |"
            echo ""
            echo "Use the artifact **coverage-report** to inspect detailed logs and the HTML coverage report."
            echo ""
            if [ -f coverage-files-table.md ]; then
              cat coverage-files-table.md
            else
              echo "Coverage by file table is unavailable."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
